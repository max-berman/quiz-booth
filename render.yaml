# Render.com Deployment Configuration
# This file defines the services needed for Quiz Booth deployment

services:
  # Backend API Service
  - type: web
    name: quiz-booth-backend
    runtime: node
    plan: starter
    region: oregon # or choose closest to your users: frankfurt, ohio, oregon, singapore
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://quiz-booth-frontend.onrender.com
      - key: FIREBASE_PROJECT_ID
        fromService:
          type: web
          name: quiz-booth-backend
          envVarKey: FIREBASE_PROJECT_ID
      - key: FIREBASE_PRIVATE_KEY
        fromService:
          type: web
          name: quiz-booth-backend
          envVarKey: FIREBASE_PRIVATE_KEY
      - key: FIREBASE_CLIENT_EMAIL
        fromService:
          type: web
          name: quiz-booth-backend
          envVarKey: FIREBASE_CLIENT_EMAIL
      - key: DEEPSEEK_API_KEY
        fromService:
          type: web
          name: quiz-booth-backend
          envVarKey: DEEPSEEK_API_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: quiz-booth-db
          property: connectionString

  # Frontend Static Site
  - type: static
    name: quiz-booth-frontend
    plan: starter
    buildCommand: cd client && npm install && npm run build
    envVars:
      - key: VITE_FIREBASE_API_KEY
        value: your_firebase_api_key_here
      - key: VITE_FIREBASE_AUTH_DOMAIN
        value: your_project.firebaseapp.com
      - key: VITE_FIREBASE_PROJECT_ID
        value: your_firebase_project_id
      - key: VITE_FIREBASE_STORAGE_BUCKET
        value: your_project.appspot.com
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        value: your_sender_id
      - key: VITE_FIREBASE_APP_ID
        value: your_app_id
      - key: VITE_API_URL
        value: https://quiz-booth-backend.onrender.com

databases:
  # PostgreSQL Database for usage tracking
  - name: quiz-booth-db
    plan: starter
    region: oregon # should match your web service region
    databaseName: quizbooth
